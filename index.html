<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Palette Generator</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for aesthetic enhancements */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            transition: background-color 0.5s ease;
        }
        .color-block {
            cursor: pointer;
            transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }
        .color-block:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .tooltip {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .tooltip.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Main Container -->
    <div id="app-container" class="w-full max-w-4xl bg-white shadow-2xl rounded-2xl p-6 md:p-10">
        
        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-6 text-center">
            Palette Generator
        </h1>
        <p class="text-lg text-gray-500 mb-8 text-center">
            Click the button to generate 5 beautiful new colors. Click on any color to copy its hex code!
        </p>

        <!-- Color Palette Display -->
        <div id="palette-container" class="flex flex-col md:flex-row gap-4 mb-10">
            <!-- Color blocks will be injected here by JavaScript -->
        </div>

        <!-- Action Button -->
        <div class="flex justify-center">
            <button id="generate-btn" class="px-8 py-3 text-lg font-semibold text-white bg-indigo-600 rounded-xl shadow-lg hover:bg-indigo-700 transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-indigo-300">
                Generate New Palette
            </button>
        </div>

        <!-- Message/Tooltip Area -->
        <div id="message-box" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 p-3 bg-green-500 text-white font-medium rounded-lg shadow-xl tooltip">
            Hex code copied to clipboard!
        </div>

    </div>

    <script>
        // Global constants for configuration
        const PALETTE_SIZE = 5;
        const paletteContainer = document.getElementById('palette-container');
        const generateButton = document.getElementById('generate-btn');
        const messageBox = document.getElementById('message-box');
        
        // --- Utility Functions ---

        /**
         * Generates a random hexadecimal color code.
         * @returns {string} The hex color string (e.g., "#A35CFF").
         */
        function generateRandomHexColor() {
            // Generate a random number between 0 and 16777215 (FFFFFF in hex)
            // Convert to hex, and pad with leading zeros if necessary
            const randomColor = Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
            return `#${randomColor.toUpperCase()}`;
        }

        /**
         * Calculates the perceived luminance of a color to determine if black or white text should be used.
         * Formula based on the W3C recommendation for relative luminance.
         * @param {string} hex - The hex color code (e.g., "#A35CFF").
         * @returns {string} Either '#000' (black) or '#FFF' (white) for contrast.
         */
        function getContrastTextColor(hex) {
            // Convert hex to R, G, B components
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            // Calculate luminance using the standard formula
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;

            // Use a threshold (usually 0.5) to decide text color
            return luminance > 0.5 ? '#000' : '#FFF';
        }

        /**
         * Copies the provided text to the clipboard and shows a temporary success message.
         * @param {string} textToCopy - The hex code to be copied.
         */
        function copyToClipboard(textToCopy) {
            // For simple text copy in an iframe environment, document.execCommand('copy') is more reliable
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showSuccessMessage(textToCopy);
                } else {
                    console.error('Copy command failed.');
                }
            } catch (err) {
                console.error('Error in copying text: ', err);
            }
            document.body.removeChild(textarea);
        }

        /**
         * Displays the success message box temporarily.
         * @param {string} hexCode - The hex code that was copied.
         */
        function showSuccessMessage(hexCode) {
            messageBox.textContent = `${hexCode} copied to clipboard!`;
            messageBox.classList.add('show');
            
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 1500); // Show for 1.5 seconds
        }

        // --- Core Application Logic ---

        /**
         * Renders the color palette elements to the DOM.
         * @param {string[]} colors - An array of hex color strings.
         */
        function renderPalette(colors) {
            paletteContainer.innerHTML = ''; // Clear existing palette
            
            colors.forEach(hex => {
                const contrastColor = getContrastTextColor(hex);
                
                // Create the color block element
                const colorBlock = document.createElement('div');
                colorBlock.className = 'color-block flex-1 flex flex-col justify-end items-center h-48 md:h-64 rounded-xl p-4 transition duration-200';
                colorBlock.style.backgroundColor = hex;
                
                // Create the hex code display text
                const hexText = document.createElement('span');
                hexText.textContent = hex;
                hexText.className = 'text-lg font-bold p-1 rounded-md bg-black bg-opacity-30 backdrop-blur-sm transition duration-200';
                hexText.style.color = contrastColor;
                
                // Add event listener for copying the hex code
                colorBlock.addEventListener('click', () => {
                    copyToClipboard(hex);
                });

                // Append text to block, and block to container
                colorBlock.appendChild(hexText);
                paletteContainer.appendChild(colorBlock);
            });
        }

        /**
         * Generates a new palette and updates the UI.
         */
        function generatePalette() {
            const newPalette = [];
            for (let i = 0; i < PALETTE_SIZE; i++) {
                newPalette.push(generateRandomHexColor());
            }
            renderPalette(newPalette);
        }

        // --- Initialization ---

        // Attach event listener to the button
        generateButton.addEventListener('click', generatePalette);

        // Generate the initial palette when the page loads
        document.addEventListener('DOMContentLoaded', generatePalette);

    </script>
</body>
</html>
